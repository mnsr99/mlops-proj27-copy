services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: jitsi_postgres
      POSTGRES_DB: jitsi_mlops
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "5050:8080"

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: jitsi_mlops
      DB_USER: user
      DB_PASSWORD: jitsi_postgres
    ports:
      - "8000:8000"
    depends_on:
      - postgres
