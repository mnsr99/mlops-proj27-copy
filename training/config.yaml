candidate_name: baseline_bart_local
seed: 42

mlflow:
  tracking_uri: "http://129.114.26.182:30500/"
  experiment_name: "jitsi-summarization"
  run_name: "bart_baseline_local_run"

data:
  dataset_name: null
  dataset_config: null

  train_file: "data/sample_retraining_data.jsonl"
  validation_file: null
  test_file: null

  text_column: "input_transcript"
  summary_column: "target_summary"

  validation_split: 0.34
  make_test_from_validation: false

  max_train_samples: 3
  max_eval_samples: 1
  max_test_samples: null

model:
  model_name: "facebook/bart-base"
  source_prefix: "summarize: "
  max_source_length: 512
  max_target_length: 128

train:
  output_dir: "outputs/bart_baseline"
  learning_rate: 3.0e-5
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  weight_decay: 0.01
  warmup_ratio: 0.05
  fp16: false

  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_strategy: "steps"
  logging_steps: 1
  save_total_limit: 2

  metric_for_best_model: "eval_rougeL"
  greater_is_better: true
  generation_num_beams: 4
