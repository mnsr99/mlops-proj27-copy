# devops/k8s/postgres/adminer.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: adminer }
  template:
    metadata:
      labels: { app: adminer }
    spec:
      containers:
      - name: adminer
        image: adminer:latest
        ports:
        - containerPort: 8080
        env:
        - name: ADMINER_DEFAULT_SERVER
          value: "postgres-postgresql.platform.svc.cluster.local"
        - name: ADMINER_DEFAULT_DRIVER
          value: "pgsql"
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: platform
spec:
  type: NodePort
  selector: { app: adminer }
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30808